<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FWI Prediction</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@800;900&family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #080b12;
            color: #dde4f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            font-size: 16px;
            line-height: 1.6;
            min-height: 100vh;
            padding: 40px 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Grid overlay background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(0deg, rgba(56, 189, 248, 0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(56, 189, 248, 0.025) 1px, transparent 1px);
            background-size: 44px 44px;
            pointer-events: none;
            z-index: 1;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        /* Headings */
        h1, h2 {
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            margin-bottom: 32px;
            background: linear-gradient(90deg, #38bdf8, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 40px;
        }

        h2 {
            font-size: 24px;
            margin-top: 48px;
            margin-bottom: 24px;
        }

        /* Form container */
        form {
            background: linear-gradient(135deg, #0d1120 0%, #111827 100%);
            border: 1px solid #1e2a42;
            border-radius: 12px;
            padding: 40px;
            margin-bottom: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        /* Input fields */
        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 16px;
            background-color: #0d1120;
            border: 1px solid #1e2a42;
            border-radius: 8px;
            color: #dde4f5;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input[type="text"]::placeholder {
            color: #8a9abf;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.1);
            background-color: rgba(13, 17, 32, 0.8);
        }

        /* Submit button */
        button[type="submit"] {
            width: 100%;
            padding: 14px 24px;
            margin-top: 8px;
            background: transparent;
            border: 2px solid #f97316;
            border-radius: 8px;
            color: #f97316;
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button[type="submit"]:hover {
            background-color: #f97316;
            color: #080b12;
            box-shadow: 0 0 20px rgba(249, 115, 22, 0.3);
            transform: translateY(-2px);
        }

        button[type="submit"]:active {
            transform: translateY(0);
        }

        /* Result section */
        .result-section {
            background: linear-gradient(135deg, #0d1120 0%, #111827 100%);
            border: 1px solid #1e2a42;
            border-left: 4px solid #38bdf8;
            border-radius: 12px;
            padding: 32px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .result-section h2 {
            margin-top: 0;
            margin-bottom: 16px;
            font-size: 20px;
        }

        .result-value {
            font-family: 'Fira Code', monospace;
            font-size: 28px;
            color: #38bdf8;
            font-weight: 700;
            letter-spacing: 1px;
            padding: 16px;
            background-color: rgba(56, 189, 248, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }

        /* Responsive */
        @media (max-width: 600px) {
            body {
                padding: 20px 16px;
            }

            .container {
                max-width: 100%;
            }

            h1 {
                font-size: 28px;
                margin-bottom: 32px;
            }

            form, .result-section {
                padding: 24px 20px;
            }

            button[type="submit"] {
                padding: 12px 20px;
                font-size: 14px;
            }

            .result-value {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>FWI Prediction</h1>
        <form action="{{ url_for('predict') }}" method="post">
            <input type="text" name="Temperature" placeholder="Temperature" required="required">
            <input type="text" name="RH" placeholder="RH" required="required">
            <input type="text" name="Ws" placeholder="Ws" required="required">
            <input type="text" name="Rain" placeholder="Rain" required="required">
            <input type="text" name="FFMC" placeholder="FFMC" required="required">
            <input type="text" name="DMC" placeholder="DMC" required="required">
            <input type="text" name="ISI" placeholder="ISI" required="required">
            <input type="text" name="Classes" placeholder="Classes" required="required">
            <input type="text" name="Region" placeholder="Region" required="required">
            <button type="submit">Predict</button>
        </form>

        <div class="result-section">
            <h2>Prediction Result</h2>
            <div class="result-value">{{ result }}</div>
        </div>
    </div>
</body>
</html>
